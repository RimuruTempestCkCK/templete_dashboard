<div id="view-promotions" class="page-view">
  <div class="page-header">
    <div>
      <h1 class="page-title">Kampanye Promo & Diskon</h1>
      <p class="page-subtitle">Rancang promo seasonal, Double Star Rewards, diskon jam tertentu (Happy Hour), dan kelola kode voucher active.</p>
    </div>
    <button class="btn-action-primary" id="btn-add-new-promo">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
      Buat Kampanye Baru
    </button>
  </div>

  <div class="table-card-wrapper">
    <div class="table-header-toolbar">
      <div class="table-actions">
        <input type="text" class="table-search-input" id="search-promo-input" placeholder="Cari nama promo atau kode...">
        <select class="chart-filter-select" id="filter-promo-status">
          <option value="all">Semua Status</option>
          <option value="Aktif">Aktif</option>
          <option value="Dijadwalkan">Dijadwalkan</option>
          <option value="Berakhir">Berakhir</option>
        </select>
      </div>
    </div>

    <div class="table-container">
      <table class="custom-table" id="promo-table">
        <thead>
          <tr>
            <th>Nama Kampanye</th>
            <th>Kode Voucher</th>
            <th>Tipe Diskon</th>
            <th>Besar Diskon</th>
            <th>Masa Berlaku</th>
            <th>Status Promo</th>
            <th>Tindakan</th>
          </tr>
        </thead>
        <tbody id="promo-table-tbody">
          <!-- Populated dynamically via JS -->
        </tbody>
      </table>
    </div>
  </div>
</div>
