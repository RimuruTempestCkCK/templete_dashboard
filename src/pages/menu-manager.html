<div id="view-menu-manager" class="page-view">
  <div class="page-header">
    <div>
      <h1 class="page-title">Manajemen Menu & Stok</h1>
      <p class="page-subtitle">Kelola daftar item kopi, frappuccino, makanan beserta harga dan bintang poin.</p>
    </div>
    <button class="btn-action-primary" id="btn-add-new-product">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
      Tambah Produk Baru
    </button>
  </div>

  <div class="table-card-wrapper">
    <div class="table-header-toolbar">
      <div class="table-actions">
        <input type="text" class="table-search-input" id="search-product-input" placeholder="Cari nama produk...">
        <select class="chart-filter-select" id="filter-product-category">
          <option value="all">Semua Kategori</option>
          <option value="Espresso">Espresso</option>
          <option value="Frappuccino">Frappuccino</option>
          <option value="Refresher">Refresher</option>
          <option value="Tea">Teas</option>
          <option value="Food">Bakery & Food</option>
        </select>
      </div>
    </div>

    <div class="table-container">
      <table class="custom-table" id="product-list-table">
        <thead>
          <tr>
            <th>Gambar / Icon</th>
            <th>Nama Produk</th>
            <th>Kategori</th>
            <th>Harga (IDR)</th>
            <th>Bintang Penukaran</th>
            <th>Stok (Cup/Pcs)</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="product-table-tbody">
          <!-- Populated via Javascript -->
        </tbody>
      </table>
    </div>
    
    <div class="table-pagination-toolbar">
      <div id="product-table-showing-info">Menampilkan 1-6 dari 6 produk</div>
      <div class="pagination-controls">
        <button class="btn-pagination" disabled>Sebelumnya</button>
        <button class="btn-pagination" disabled>Selanjutnya</button>
      </div>
    </div>
  </div>
</div>
