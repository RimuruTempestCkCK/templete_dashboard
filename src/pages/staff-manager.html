<div id="view-staff-manager" class="page-view">
  <div class="page-header">
    <div>
      <h1 class="page-title">Manajemen Staf & Jadwal Shift</h1>
      <p class="page-subtitle">Kelola daftar barista, status kehadiran real-time, pembagian shift kerja, dan performa barista.</p>
    </div>
    <button class="btn-action-primary" id="btn-add-new-staff">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
      Tambah Staf Baru
    </button>
  </div>

  <div class="table-card-wrapper">
    <div class="table-header-toolbar">
      <div class="table-actions">
        <input type="text" class="table-search-input" id="search-staff-input" placeholder="Cari nama barista...">
        <select class="chart-filter-select" id="filter-staff-shift">
          <option value="all">Semua Shift</option>
          <option value="Pagi">Shift Pagi (06:00 - 14:00)</option>
          <option value="Siang">Shift Siang (14:00 - 22:00)</option>
          <option value="Malam">Shift Malam (22:00 - 06:00)</option>
        </select>
      </div>
    </div>

    <div class="table-container">
      <table class="custom-table" id="staff-table">
        <thead>
          <tr>
            <th>Avatar</th>
            <th>Nama Lengkap</th>
            <th>Jabatan</th>
            <th>Shift Hari Ini</th>
            <th>Status Kerja</th>
            <th>Rating Kecepatan</th>
            <th>Aksi Kehadiran</th>
          </tr>
        </thead>
        <tbody id="staff-table-tbody">
          <!-- Populated dynamically via JS -->
        </tbody>
      </table>
    </div>
  </div>
</div>
