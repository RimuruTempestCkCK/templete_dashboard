<div id="view-inventory-manager" class="page-view">
  <div class="page-header">
    <div>
      <h1 class="page-title">Inventaris & Stok Bahan Baku</h1>
      <p class="page-subtitle">Pantau pasokan biji kopi, sirup rasa, susu segar, cup berlogo, dan status pemesanan ke supplier.</p>
    </div>
    <button class="btn-action-primary" id="btn-reorder-all-low">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18.5"/></svg>
      Pesan Semua Stok Rendah
    </button>
  </div>

  <div class="table-card-wrapper">
    <div class="table-header-toolbar">
      <div class="table-actions">
        <input type="text" class="table-search-input" id="search-inventory-input" placeholder="Cari nama bahan baku...">
        <select class="chart-filter-select" id="filter-inventory-status">
          <option value="all">Semua Status</option>
          <option value="Cukup">Stok Cukup</option>
          <option value="Hampir Habis">Hampir Habis (< 20%)</option>
          <option value="Habis">Habis (0)</option>
        </select>
      </div>
    </div>

    <div class="table-container">
      <table class="custom-table" id="inventory-table">
        <thead>
          <tr>
            <th>Bahan Baku</th>
            <th>Kategori</th>
            <th>Sisa Stok</th>
            <th>Satuan</th>
            <th>Tingkat Ketersediaan</th>
            <th>Status Pasokan</th>
            <th>Restock Instan</th>
          </tr>
        </thead>
        <tbody id="inventory-table-tbody">
          <!-- Populated dynamically via JS -->
        </tbody>
      </table>
    </div>
  </div>
</div>
