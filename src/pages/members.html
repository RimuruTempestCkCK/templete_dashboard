<div id="view-members" class="page-view">
  <div class="page-header">
    <div>
      <h1 class="page-title">Loyalitas Starbucks Member</h1>
      <p class="page-subtitle">Kelola saldo kartu member, jumlah bintang terkumpul, dan tiering loyalitas pelanggan.</p>
    </div>
  </div>

  <div class="table-card-wrapper">
    <div class="table-header-toolbar">
      <div class="table-actions">
        <input type="text" class="table-search-input" id="search-member-input" placeholder="Cari nama member...">
      </div>
    </div>

    <div class="table-container">
      <table class="custom-table" id="member-loyalty-table">
        <thead>
          <tr>
            <th>Avatar</th>
            <th>Nama Member</th>
            <th>Email Terdaftar</th>
            <th>Bintang (★)</th>
            <th>Starbucks Card ID</th>
            <th>Gold Member Tier</th>
            <th>Hadiah Tersedia</th>
            <th>Aksi Loyalitas</th>
          </tr>
        </thead>
        <tbody id="member-table-tbody">
          <!-- Dynamic Members -->
        </tbody>
      </table>
    </div>
  </div>
</div>
