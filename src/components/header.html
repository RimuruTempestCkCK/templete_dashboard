<header class="top-bar">
  <div class="header-left">
    <button class="btn-menu-toggle" id="btn-mobile-sidebar-toggle">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    
    <div class="topbar-search-wrapper">
      <span class="topbar-search-icon">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </span>
      <input type="text" class="topbar-search-input" placeholder="Cari transaksi, produk, member...">
    </div>
  </div>

  <div class="header-right">
    <div class="current-date-box">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7V12l3 3m9-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <span id="live-clock">Senin, 20 Juli 2026</span>
    </div>

    <!-- Light/Dark Mode Switcher -->
    <button class="theme-toggle-btn" id="btn-theme-toggle" title="Ubah Tema">
      <!-- Sun Icon (shown in dark mode) -->
      <svg class="light-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707.707M12 7a5 5 0 100 10 5 5 0 000-10z"/></svg>
      <!-- Moon Icon (shown in light mode) -->
      <svg class="dark-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
    </button>

    <!-- Notifications Dropdown Trigger -->
    <div class="notification-wrapper">
      <button class="btn-notification" id="btn-notifications" title="Notifikasi">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
        <span class="notification-badge">3</span>
      </button>
    </div>
  </div>
</header>
