<div id="auth-view" class="auth-container">
  <!-- Login Form Card -->
  <div id="login-card" class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="48" fill="#006241"/>
        <path d="M50 8C26.8 8 8 26.8 8 50s18.8 42 42 42 42-18.8 42-42S73.2 8 50 8zm0 80c-21 0-38-17-38-38s17-38 38-38 38 17 38 38-17 38-38 38z" fill="#ffffff"/>
        <path d="M50 32l3 7.5 7.7.8-5.8 5.1 1.7 7.6-6.6-4.1-6.6 4.1 1.7-7.6-5.8-5.1 7.7-.8z" fill="#ffffff"/>
        <path d="M50 50c-3.3 0-6 2.7-6 6 0 4 6 12 6 12s6-8 6-12c0-3.3-2.7-6-6-6zm0 8.5c-1.4 0-2.5-1.1-2.5-2.5s1.1-2.5 2.5-2.5 2.5 1.1 2.5 2.5-1.1 2.5-2.5 2.5z" fill="#ffffff"/>
        <path d="M38 46c-1.5 0-3 1-3.5 2.5-1 3.5 2 7 5.5 7.5.5 0 1-.5 1-1V52c0-1.5-1-3-2.5-3.5-.5-.1-1-.2-1-.5s.5-.5 1-.5h1V46h-1.5zm24 0h-1.5v1.5h1c.5 0 1 .2 1 .5s-.5.4-1 .5c-1.5.5-2.5 2-2.5 3.5v3c0 .5.5 1 1 1 3.5-.5 6.5-4 5.5-7.5-.5-1.5-2-2.5-3.5-2.5z" fill="#ffffff"/>
      </svg>
    </div>
    <h2 class="auth-title">Starbucks Store Portal</h2>
    <p class="auth-subtitle">Masuk untuk mengelola pesanan, stok kopi, dan member.</p>
    
    <form id="login-form">
      <div class="auth-form-group">
        <label class="auth-label" for="login-email">Email Administrator</label>
        <div class="auth-input-wrapper">
          <span class="auth-input-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          </span>
          <input type="email" id="login-email" class="auth-input" placeholder="admin@starbucks.co.id" required value="admin@starbucks.co.id">
        </div>
      </div>
      
      <div class="auth-form-group">
        <label class="auth-label" for="login-password">Sandi Akun</label>
        <div class="auth-input-wrapper">
          <span class="auth-input-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          </span>
          <input type="password" id="login-password" class="auth-input" placeholder="••••••••" required value="admin123">
        </div>
      </div>
      
      <div class="auth-action-row">
        <label class="remember-me">
          <input type="checkbox" id="login-remember" checked> Ingat Perangkat
        </label>
        <a href="#" class="forgot-password" id="btn-forgot-password">Lupa Sandi?</a>
      </div>
      
      <button type="submit" class="btn-auth-submit">Masuk ke Portal</button>
    </form>
    
    <div class="auth-footer">
      Belum memiliki akun portal? <a href="#" id="link-show-register">Daftar di sini</a>
    </div>
  </div>

  <!-- Register Form Card -->
  <div id="register-card" class="auth-card" style="display: none;">
    <div class="auth-logo">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="48" fill="#006241"/>
        <path d="M50 8C26.8 8 8 26.8 8 50s18.8 42 42 42 42-18.8 42-42S73.2 8 50 8zm0 80c-21 0-38-17-38-38s17-38 38-38 38 17 38 38-17 38-38 38z" fill="#ffffff"/>
        <path d="M50 32l3 7.5 7.7.8-5.8 5.1 1.7 7.6-6.6-4.1-6.6 4.1 1.7-7.6-5.8-5.1 7.7-.8z" fill="#ffffff"/>
        <path d="M50 50c-3.3 0-6 2.7-6 6 0 4 6 12 6 12s6-8 6-12c0-3.3-2.7-6-6-6zm0 8.5c-1.4 0-2.5-1.1-2.5-2.5s1.1-2.5 2.5-2.5 2.5 1.1 2.5 2.5-1.1 2.5-2.5 2.5z" fill="#ffffff"/>
        <path d="M38 46c-1.5 0-3 1-3.5 2.5-1 3.5 2 7 5.5 7.5.5 0 1-.5 1-1V52c0-1.5-1-3-2.5-3.5-.5-.1-1-.2-1-.5s.5-.5 1-.5h1V46h-1.5zm24 0h-1.5v1.5h1c.5 0 1 .2 1 .5s-.5.4-1 .5c-1.5.5-2.5 2-2.5 3.5v3c0 .5.5 1 1 1 3.5-.5 6.5-4 5.5-7.5-.5-1.5-2-2.5-3.5-2.5z" fill="#ffffff"/>
      </svg>
    </div>
    <h2 class="auth-title">Daftar Akun Portal</h2>
    <p class="auth-subtitle">Registrasi akun administrator store Starbucks baru.</p>
    
    <form id="register-form">
      <div class="auth-form-group">
        <label class="auth-label" for="reg-name">Nama Lengkap</label>
        <div class="auth-input-wrapper">
          <span class="auth-input-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          </span>
          <input type="text" id="reg-name" class="auth-input" placeholder="Maximilian Top" required>
        </div>
      </div>

      <div class="auth-form-group">
        <label class="auth-label" for="reg-email">Email Store</label>
        <div class="auth-input-wrapper">
          <span class="auth-input-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          </span>
          <input type="email" id="reg-email" class="auth-input" placeholder="name@starbucks.co.id" required>
        </div>
      </div>
      
      <div class="auth-form-group">
        <label class="auth-label" for="reg-password">Sandi Baru</label>
        <div class="auth-input-wrapper">
          <span class="auth-input-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          </span>
          <input type="password" id="reg-password" class="auth-input" placeholder="Min. 6 karakter" required>
        </div>
      </div>
      
      <button type="submit" class="btn-auth-submit">Daftar Akun</button>
    </form>
    
    <div class="auth-footer">
      Sudah memiliki akun portal? <a href="#" id="link-show-login">Masuk di sini</a>
    </div>
  </div>
</div>
